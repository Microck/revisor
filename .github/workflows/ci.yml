name: ci

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install
        run: npm install

      - name: test
        run: npm test

      - name: build
        run: npm run build

      - name: package
        run: npm pack --dry-run
